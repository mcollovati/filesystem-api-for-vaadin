# Release workflow — publishes to Maven Central and creates a GitHub release.
#
# Triggered manually via workflow_dispatch. Supports dry-run mode for testing.
#
# Required secrets:
#   JRELEASER_GPG_SECRET_KEY          — ASCII-armored PGP private key
#   JRELEASER_GPG_PASSPHRASE          — passphrase for the PGP key
#   JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME — Maven Central token username
#   JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD — Maven Central token password
#
# GITHUB_TOKEN is provided automatically.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (test without publishing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository == 'mcollovati/filesystem-api-for-vaadin'
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Validate release version
        run: |
          fail() {
            echo "::error::$1"
            echo "## :x: Release validation failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$1" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "POM version: ${POM_VERSION}"

          BASE_VERSION="${POM_VERSION%-SNAPSHOT}"
          if [ "${BASE_VERSION}" = "${POM_VERSION}" ]; then
            fail "POM version '${POM_VERSION}' is not a SNAPSHOT version"
          fi

          POM_MAJOR=$(echo "${BASE_VERSION}" | cut -d. -f1)
          POM_MINOR=$(echo "${BASE_VERSION}" | cut -d. -f2)

          INPUT_VERSION="${{ inputs.version }}"
          # Accept GA (X.Y.Z) or pre-release (X.Y.Z-alpha<N>, X.Y.Z-beta<N>, X.Y.Z-rc<N>)
          if ! echo "${INPUT_VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)[0-9]+)?$'; then
            fail "Invalid version format '${INPUT_VERSION}'. Expected X.Y.Z or X.Y.Z-{alpha,beta,rc}N"
          fi

          # Extract major.minor from input (strip any pre-release suffix first)
          INPUT_BASE=$(echo "${INPUT_VERSION}" | sed 's/-.*//')
          INPUT_MAJOR=$(echo "${INPUT_BASE}" | cut -d. -f1)
          INPUT_MINOR=$(echo "${INPUT_BASE}" | cut -d. -f2)

          if [ "${POM_MAJOR}" != "${INPUT_MAJOR}" ] || [ "${POM_MINOR}" != "${INPUT_MINOR}" ]; then
            fail "Version '${INPUT_VERSION}' incompatible with POM '${POM_VERSION}'. Expected ${POM_MAJOR}.${POM_MINOR}.x"
          fi

          echo "Validation passed: ${INPUT_VERSION} is compatible with ${POM_VERSION}"

      - name: Check tag does not exist
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag '${{ inputs.version }}' already exists"
            echo "## :x: Release validation failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Tag '${{ inputs.version }}' already exists" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Set release version
        run: mvn versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false -B

      - name: Build and verify
        run: mvn verify -B

      - name: Deploy to local staging
        run: mvn deploy -Prelease -DskipTests -B

      - name: Run JReleaser
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "::warning::DRY RUN mode — no artifacts will be published, no tags or releases will be created"
            DRY_RUN_FLAG="-Djreleaser.dry.run=true"
          fi
          mvn -N jreleaser:full-release -Prelease ${DRY_RUN_FLAG} -B

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties
            target/jreleaser/release/
            target/jreleaser/deploy/
            target/jreleaser/signing/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload staged artifacts (dry-run)
        if: inputs.dry-run == true
        uses: actions/upload-artifact@v4
        with:
          name: staged-artifacts
          path: target/staging-deploy/
          retention-days: 3
